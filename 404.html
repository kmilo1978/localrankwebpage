<!DOCTYPE html>
<html lang="es">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#f9a8d4;--dark:#050505}
body{font-family:'Inter',system-ui,sans-serif;background:var(--dark);color:#e8e8e8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}

h1{font-size:1.5rem;font-weight:600;margin-top:1rem;color:#fff}
p{color:rgba(255,255,255,.6);font-size:.95rem;margin-top:.75rem;line-height:1.6}
.buttons{display:flex;gap:.75rem;justify-content:center;margin-top:2rem;flex-wrap:wrap}
.btn{padding:.7rem 1.5rem;border-radius:9999px;font-size:.85rem;font-weight:600;transition:all .3s;text-decoration:none}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(249,168,212,.3)}
.btn-outline{border:1px solid rgba(249,168,212,.3);color:var(--accent)}.btn-outline:hover{background:rgba(249,168,212,.08)}
.logo{margin-bottom:2rem;font-size:1.25rem;font-weight:600;color:#fff;text-decoration:none}.logo span{color:var(--accent)}
.redirect-note{color:rgba(255,255,255,.3);font-size:.75rem;margin-top:2.5rem}

</head>
<body>
<div class="container">
  <a href="index.html" class="logo"><img src="https://statics.pancake.vn/web-media-263/98/37/f6/f5/6683269e9bdd5d0d69877a209af61eeac0558a99abef5da73dead3cc.jpg" alt="LocalRank" style="height:34px"></a>

</div>

const t=setInterval(()=>{s--;el.textContent=s;if(s<=0){clearInterval(t);window.location.href='index.html'}},1000);
</script>
